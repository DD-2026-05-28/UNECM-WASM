<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNECM</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 1px solid #e5e5e7;
            padding-bottom: 10px;
        }
        .upload-zone {
            border: 2px dashed #0071e3;
            padding: 40px 20px;
            text-align: center;
            border-radius: 8px;
            background: #fbfbfd;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-zone:hover {
            background: #f0f7ff;
        }
        #fileInput {
            display: none;
        }
        .status-panel {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f7;
            border-radius: 6px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #d2d2d7;
        }
        .btn {
            display: inline-block;
            background: #0071e3;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 15px;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }
        .btn:disabled {
            background: #999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ECM to BIN Converter</h2>
    <p>Select an <code>.ecm</code> file to restore it back to a standard <code>.bin</code> image file.</p>
    
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <span id="uploadText">Click to select or drag and drop an .ecm file here</span>
        <input type="file" id="fileInput" accept=".ecm">
    </div>

    <button id="processBtn" class="btn" disabled>Generate .bin & Download</button>

    <h3>Console Output</h3>
    <div id="output" class="status-panel">Waiting for user action...</div>
</div>

<script src="unecm.js"></script>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadText = document.getElementById('uploadText');
    const processBtn = document.getElementById('processBtn');
    const outputDiv = document.getElementById('output');

    let selectedFile = null;

    function log(text) {
        outputDiv.innerText += text + '\n';
        outputDiv.scrollTop = outputDiv.scrollHeight;
    }

    function clearLog() {
        outputDiv.innerText = '';
    }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.name.toLowerCase().endsWith('.ecm')) {
            alert('Error: Please select a file with an .ecm extension!');
            fileInput.value = '';
            return;
        }

        selectedFile = file;
        uploadText.innerText = `Selected: ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
        processBtn.disabled = false;
        clearLog();
        log(`File ready: ${file.name}`);
    });

    processBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        processBtn.disabled = true;
        fileInput.disabled = true;
        clearLog();
        log('Initializing WebAssembly module...');

        try {
            const arrayBuffer = await selectedFile.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);

            const Module = await createUnecmModule({
                print: function(text) { console.log(text); },
                printErr: function(text) { log(text); } 
            });

            const inFilename = selectedFile.name;
            
            let outFilename = inFilename.substring(0, inFilename.length - 4);
            if (!outFilename.toLowerCase().endsWith('.bin')) {
                outFilename += '.bin';
            }

            log('Writing to virtual file system...');
            Module.FS.writeFile(inFilename, uint8Array);

            log('Parsing ECM structure and restoring BIN data...');
            const exitCode = Module.callMain([inFilename, outFilename]);

            if (exitCode === 0) {
                log('Decoding successful! Extracting BIN file...');
                
                const decodedData = Module.FS.readFile(outFilename);
                const blob = new Blob([decodedData], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = outFilename;
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                log('Download triggered successfully.');
            } else {
                log(`Decoding failed, application exited with code: ${exitCode}`);
            }

            Module.FS.unlink(inFilename);
            try { Module.FS.unlink(outFilename); } catch(e) {}

        } catch (error) {
            log(`Runtime exception: ${error.message}`);
            console.error(error);
        } finally {
            processBtn.disabled = false;
            fileInput.disabled = false;
        }
    });
</script>

</body>
</html>
